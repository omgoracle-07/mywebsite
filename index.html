<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMGoracle Luxury Store</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
    /* ===== CINEMATIC BACKGROUND EFFECT ===== */

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 20% 30%, rgba(212,175,55,0.08), transparent 40%),
               radial-gradient(circle at 80% 70%, rgba(212,175,55,0.08), transparent 40%);
    pointer-events:none;
    animation:floatGlow 8s ease-in-out infinite alternate;
}

@keyframes floatGlow{
    from{transform:translateY(-10px);}
    to{transform:translateY(10px);}
}

/* ===== GOLD SHIMMER TEXT ===== */

.hero-left h1{
    font-size:48px;
    font-family:'Playfair Display',serif;

    background: linear-gradient(
        90deg,
        #d4af37,
        #fff6cc,
        #d4af37
    );

    background-size:200% auto;
    background-position:0% center;

    color:transparent;
    -webkit-background-clip:text;
    background-clip:text;

    animation:shine 3s linear infinite;
}

@keyframes shine{
    0%{
        background-position:0% center;
    }
    100%{
        background-position:200% center;
    }
}
@keyframes shine{
    0%{background-position:0% center;}
    100%{background-position:200% center;}
}

/* ===== FADE IN ANIMATION ===== */

.hero-left,
.hero-right{
    animation:fadeIn 1.5s ease forwards;
    opacity:0;
}

@keyframes fadeIn{
    to{opacity:1;}
}

/* ===== PREMIUM BUTTON GLOW ===== */

.hero-btn{
    box-shadow:0 0 20px rgba(212,175,55,0.4);
}

.hero-btn:hover{
    box-shadow:0 0 35px rgba(212,175,55,0.8);
}
    /* HERO SECTION */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:80px 5%;
}

.hero-left{
width:50%;
}

.hero-left h1{
font-size:42px;
color:var(--gold);
margin-bottom:20px;
font-family:'Playfair Display',serif;
}

.hero-left p{
opacity:0.8;
margin-bottom:25px;
line-height:1.6;
}

.hero-btn{
background:var(--gold);
color:black;
padding:12px 30px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

.hero-right{
width:40%;
}

.hero-right img{
width:100%;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}
:root{
--gold:#d4af37;
--dark:#161616;
--white:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* LOGIN PAGE */
#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
padding:45px;
border-radius:20px;
width:320px;
text-align:center;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
animation:fade 0.8s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

.login-logo{
width:80px;
margin-bottom:20px;
border-radius:50%;
box-shadow:0 0 20px #d4af37;
}

.login-box h2{
font-family:'Playfair Display',serif;
color:var(--gold);
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:12px 0;
background:rgba(255,255,255,0.08);
border:1px solid var(--gold);
border-radius:30px;
color:white;
outline:none;
transition:0.3s;
}

.login-box input:focus{
box-shadow:0 0 10px var(--gold);
}

.login-box button{
width:100%;
padding:12px;
background:var(--gold);
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.login-box button:hover{
background:white;
color:black;
transform:scale(1.05);
}

/* MAIN SITE */
#mainSite{
display:none;
}

header{
display:flex;
justify-content:space-between;
padding:20px 5%;
background:rgba(0,0,0,0.7);
}

.logo{
font-family:'Playfair Display',serif;
color:var(--gold);
font-size:1.5rem;
}

.cart{
cursor:pointer;
border:1px solid var(--gold);
padding:8px 15px;
}

.shop{
padding:40px 5%;
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:var(--dark);
border:1px solid #222;
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.info{
padding:15px;
text-align:center;
}

.price{
color:var(--gold);
margin:10px 0;
}

button{
background:transparent;
border:1px solid var(--gold);
color:white;
padding:6px 15px;
cursor:pointer;
margin:5px;
}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:var(--dark);
padding:25px;
max-width:350px;
text-align:center;
border:1px solid var(--gold);
}

.admin{
display:none;
text-align:center;
margin-top:40px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<img src="image/logo.png" class="login-logo">
<h2>OMGoracle Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- MAIN WEBSITE -->
<div id="mainSite">
<section class="hero">
  <div class="hero-left">
    <h1>OMGoracle Luxury Collection</h1>
    <p>
      Crafted with passion. Designed for elegance.
      Premium epoxy candles made for those who love luxury.
    </p>
    <button class="hero-btn">Explore Collection</button>
  </div>

  <div class="hero-right">
    <img src="image/mypic.jpeg">
    <h3 class="founder-name">Om Prakash</h3>
  </div>
</section>
<header>
<div class="logo">OMGoracle</div>
<div class="cart" onclick="openCart()">Cart (<span id="count">0</span>)</div>
</header>

<section class="shop">
<div class="grid" id="productGrid">

<div class="card">
<img src="image/blackcandle.jpeg">
<div class="info">
<h3>Midnight Onyx</h3>
<p class="price">₹1499</p>
<button onclick="addToCart('Midnight Onyx',1499)">Add</button>
</div>
</div>

<div class="card">
<img src="image/pinkcandle.jpeg">
<div class="info">
<h3>Rose Quartz</h3>
<p class="price">₹1499</p>
<button onclick="addToCart('Rose Quartz',1499)">Add</button>
</div>
</div>

</div>
</section>

</div>

<script>
let cart=[];

function login(){
let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="omg123"){
document.getElementById("loginPage").style.display="none";
document.getElementById("mainSite").style.display="block";
}else{
alert("Invalid Username or Password");
}
}

function addToCart(name,price){
cart.push({name,price});
document.getElementById("count").innerText=cart.length;
}

function openCart(){
alert("Cart feature coming soon 🔥");
}
</script>

</body>
</html>
