<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMGoracle Luxury Candles</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#000;
position:fixed;
top:0;
z-index:1000;
}

.logo{
color:#D4AF37;
font-size:24px;
font-weight:bold;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
color:#ddd;
text-decoration:none;
}

/* HERO */

.hero{
width:100%;
min-height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%;
background:linear-gradient(90deg,#000,#111);
}

.hero-content{
max-width:500px;
}

.hero-content h1{
font-size:60px;
line-height:1.2;
}

.hero-content span{
color:#D4AF37;
}

.hero-content p{
margin:20px 0;
color:#ccc;
}

.btn{
background:#D4AF37;
border:none;
padding:12px 30px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.hero-image img{
width:450px;
max-width:100%;
}

/* PRODUCTS */

.products{
padding:120px 8%;
text-align:center;
}

.products h2{
color:#D4AF37;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
border:1px solid rgba(212,175,55,0.2);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px rgba(212,175,55,.4);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#D4AF37;
margin:10px 0;
}

/* CART */

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#111;
padding:30px;
transition:.4s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
border-bottom:1px solid #333;
padding:10px 0;
}

.total{
color:#D4AF37;
margin:10px 0;
}

input{
width:100%;
padding:10px;
margin-top:10px;
background:#222;
border:none;
border-radius:6px;
color:white;
}

/* TRACK */

.track{
padding:120px 8%;
text-align:center;
}

footer{
text-align:center;
padding:30px;
background:#111;
color:#D4AF37;
}

</style>
</head>

<body>

<nav>

<div class="logo">OMGoracle</div>

<ul>

<li><a href="#">Home</a></li>
<li><a href="#shop">Shop</a></li>
<li><a href="#track">Track</a></li>
<li onclick="toggleCart()">🛒</li>

</ul>

</nav>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>Light That Defines <span>Luxury</span></h1>

<p>
Discover handcrafted candles that elevate your senses
with elegance and exquisite fragrance.
</p>

<button class="btn" onclick="scrollShop()">Shop Now</button>

</div>

<div class="hero-image">

<img src="blackcandle.jpg">

</div>

</section>

<!-- PRODUCTS -->

<section class="products" id="shop">

<h2>Best Sellers</h2>

<div class="grid">

<div class="card">

<img src="blackcandle.jpg">

<h3>Black Edition</h3>

<p class="price">₹899</p>

<button class="btn" onclick="addToCart('Black Edition',899)">
Add to Cart
</button>

</div>

<div class="card">

<img src="pinkcandle.jpg">

<h3>Pink Luxury</h3>

<p class="price">₹999</p>

<button class="btn" onclick="addToCart('Pink Luxury',999)">
Add to Cart
</button>

</div>

</div>

</section>

<!-- TRACK -->

<section class="track" id="track">

<h2>Track Your Order</h2>

<input type="text" id="trackInput" placeholder="Enter Order ID">

<br><br>

<button class="btn" onclick="trackOrder()">Track</button>

<p id="trackResult"></p>

</section>

<!-- CART -->

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="items"></div>

<p class="total">
Total ₹<span id="total">0</span>
</p>

<h3>Checkout</h3>

<input type="text" placeholder="Name" id="name">
<input type="tel" placeholder="Phone" id="phone">
<input type="text" placeholder="Address" id="address">

<br>

<button class="btn" onclick="payNow()">Pay with Razorpay</button>

<button class="btn" onclick="whatsappOrder()">WhatsApp Order</button>

</div>

<footer>

OMGoracle Luxury Candles

</footer>

<script>

let cart=[]

function toggleCart(){
document.getElementById("cart").classList.toggle("active")
}

function scrollShop(){
document.getElementById("shop").scrollIntoView({behavior:"smooth"})
}

function addToCart(name,price){

cart.push({name,price})

updateCart()

}

function updateCart(){

let html=""
let total=0

cart.forEach(item=>{

html+=`<div class="cart-item">${item.name} ₹${item.price}</div>`

total+=item.price

})

document.getElementById("items").innerHTML=html
document.getElementById("total").innerText=total

}

function payNow(){

let total=document.getElementById("total").innerText

var options={

key:"rzp_test_SNNhs7RaPBITes",

amount:total*100,

currency:"INR",

name:"OMGoracle",

handler:function(){

let orderID="OMG"+Math.floor(Math.random()*100000)

localStorage.setItem("orderID",orderID)

alert("Payment Success! Order ID: "+orderID)

generateInvoice(orderID)

}

}

var rzp=new Razorpay(options)

rzp.open()

}

function trackOrder(){

let id=document.getElementById("trackInput").value

let saved=localStorage.getItem("orderID")

if(id===saved){

document.getElementById("trackResult").innerText="Order Shipped 🚚"

}else{

document.getElementById("trackResult").innerText="Order Not Found"

}

}

function generateInvoice(id){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

doc.text("OMGoracle Invoice",20,20)

doc.text("Order ID: "+id,20,40)

doc.text("Thank you for shopping",20,60)

doc.save("invoice.pdf")

}

function whatsappOrder(){

let total=document.getElementById("total").innerText

window.open("https://wa.me/919122535159?text=Hello OMGoracle I want to order candles worth ₹"+total)

}

</script>

</body>
</html>
