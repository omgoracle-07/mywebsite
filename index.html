
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMGoracle Luxury Candles</title>

<link rel="icon" href="logo.png">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0b0b;
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:15px 8%;
background:black;
}

.logo{
color:#d4af37;
font-size:22px;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:20px;
}

nav a{
color:white;
text-decoration:none;
}

.cart{
color:#d4af37;
}

.hero{
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:center;
padding:40px;
}

.hero img{
width:320px;
border-radius:10px;
}

.hero-text{
margin-left:40px;
}

.hero-text h1{
color:#d4af37;
}

.btn{
border:1px solid #d4af37;
padding:10px 20px;
color:#d4af37;
text-decoration:none;
}

.section{
padding:50px;
text-align:center;
}

.products{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.card{
background:#111;
padding:20px;
width:230px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:#d4af37;
}

button{
border:1px solid #d4af37;
background:none;
color:#d4af37;
padding:8px 20px;
cursor:pointer;
margin-top:10px;
}

footer{
text-align:center;
padding:20px;
background:black;
color:#aaa;
}

.panel{
display:none;
padding:30px;
text-align:center;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<nav>

<div class="logo">OMGoracle</div>

<ul>

<li><a href="#">Home</a></li>
<li><a href="#shop">Shop</a></li>

<li class="cart">
🛒 <span id="cart-count">0</span>
</li>

<li><a href="#" onclick="showLogin()">Login</a></li>

</ul>

</nav>


<!-- HERO -->

<section class="hero">

<img src="blackcandle.jpg">

<div class="hero-text">

<h1>Light That Defines Luxury</h1>

<p>Premium handcrafted candles designed for elegance and peace.</p>

<a href="#shop" class="btn">Shop Now</a>

</div>

</section>


<!-- PRODUCTS -->

<section id="shop" class="section">

<h2>Best Sellers</h2>

<div class="products">

<div class="card">

<img src="candle1.jpg">

<h3>Eternal Bliss</h3>

<p class="price">₹799</p>

<button onclick="addCart('Eternal Bliss',799)">Add to Cart</button>

</div>


<div class="card">

<img src="candle2.jpg">

<h3>Vania Dream</h3>

<p class="price">₹899</p>

<button onclick="addCart('Vania Dream',899)">Add to Cart</button>

</div>


<div class="card">

<img src="candle3.jpg">

<h3>Mystic Oud</h3>

<p class="price">₹1099</p>

<button onclick="addCart('Mystic Oud',1099)">Add to Cart</button>

</div>

</div>

<br>

<button onclick="checkout()">Checkout</button>

</section>


<!-- LOGIN PANEL -->

<div id="loginPanel" class="panel">

<h2>Customer Login</h2>

<input id="email" placeholder="Email">

<input id="pass" placeholder="Password">

<br>

<button onclick="login()">Login</button>

</div>


<!-- TRACKING -->

<div id="tracking" class="panel">

<h2>Order Tracking</h2>

<input id="trackId" placeholder="Enter Order ID">

<br>

<button onclick="track()">Track Order</button>

<p id="trackResult"></p>

</div>


<footer>

Official Launch — 23 March | © OMGoracle

</footer>


<script>

/* CART SYSTEM */

let cart=[]
let total=0

function addCart(name,price){

cart.push({name,price})

total+=price

document.getElementById("cart-count").innerText=cart.length

alert("Added to Cart")

}


/* LOGIN */

function showLogin(){

document.getElementById("loginPanel").style.display="block"

}

function login(){

alert("Login Success")

}


/* CHECKOUT */

function checkout(){

if(cart.length==0){

alert("Cart Empty")

return

}

var options = {

key:"rzp_test_SNNhs7RaPBITes",

amount:total*100,

currency:"INR",

name:"OMGoracle",

description:"Luxury Candle Purchase",

handler:function(){

generateInvoice()

}

}

var rzp=new Razorpay(options)

rzp.open()

}


/* INVOICE PDF */

function generateInvoice(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

doc.text("OMGoracle Invoice",20,20)

let y=40

cart.forEach(p=>{

doc.text(p.name+" - ₹"+p.price,20,y)

y+=10

})

doc.text("Total ₹"+total,20,y+10)

doc.save("OMGoracle_invoice.pdf")

alert("Payment Successful")

}


/* ORDER TRACKING */

function track(){

let id=document.getElementById("trackId").value

document.getElementById("trackResult").innerText=

"Order "+id+" is being prepared 🚚"

}

</script>

</body>
</html>
