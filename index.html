<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMGoracle Luxury Candles</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI';
background:#0b0b0b;
color:white;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#000;
z-index:1000;
}

.logo{
font-size:24px;
color:#D4AF37;
font-weight:bold;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav a{
color:#ddd;
text-decoration:none;
}

.cart-icon{
cursor:pointer;
position:relative;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:#D4AF37;
color:black;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

/* HERO */

.hero{
height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:60px;
}

.hero span{
color:#D4AF37;
}

/* PRODUCTS */

.products{
padding:120px 8%;
text-align:center;
}

.section-title{
font-size:32px;
color:#D4AF37;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#111;
padding:20px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#D4AF37;
margin:10px 0;
}

.qty{
width:60px;
padding:5px;
margin-top:5px;
}

.btn{
background:#D4AF37;
border:none;
padding:10px 25px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

/* CART */

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#111;
padding:25px;
transition:0.4s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
border-bottom:1px solid #333;
padding:10px 0;
}

.remove{
color:red;
cursor:pointer;
font-size:14px;
}

.total{
font-size:18px;
color:#D4AF37;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

footer{
text-align:center;
padding:25px;
background:#111;
color:#D4AF37;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">OMGoracle</div>

<ul>

<li><a href="#">Home</a></li>
<li><a href="#">Shop</a></li>

<li class="cart-icon" onclick="toggleCart()">

🛒

<span class="cart-count" id="count">0</span>

</li>

</ul>

</nav>

<!-- HERO -->

<section class="hero">

<h1>Luxury <span>Candles</span></h1>

</section>

<!-- PRODUCTS -->

<section class="products">

<h2 class="section-title">Best Sellers</h2>

<div class="grid">

<!-- PRODUCT 1 -->

<div class="card">

<img src="blackcandle.jpg">

<h3>Black Edition</h3>

<p class="price">₹899</p>

Qty

<input type="number" id="q1" value="1" class="qty">

<br><br>

<button class="btn"
onclick="addToCart('Black Edition',899,'q1')">

Add to Cart

</button>

</div>

<!-- PRODUCT 2 -->

<div class="card">

<img src="pinkcandle.jpg">

<h3>Pink Luxury</h3>

<p class="price">₹999</p>

Qty

<input type="number" id="q2" value="1" class="qty">

<br><br>

<button class="btn"
onclick="addToCart('Pink Luxury',999,'q2')">

Add to Cart

</button>

</div>

</div>

</section>

<!-- CART -->

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="items"></div>

<p class="total">

Total ₹<span id="total">0</span>

</p>

<h3>Checkout</h3>

<input type="text" placeholder="Full Name" id="name">

<input type="tel" placeholder="Phone" id="phone">

<input type="text" placeholder="Address" id="address">

<br>

<button class="btn" onclick="payNow()">

Pay with Razorpay

</button>

</div>

<footer>

Official Launch – 23 March 🎂 | OMGoracle

</footer>

<script>

let cart=[]

function toggleCart(){

document.getElementById("cart").classList.toggle("active")

}

function addToCart(name,price,id){

let qty=document.getElementById(id).value

cart.push({

name,

price,

qty

})

updateCart()

}

function updateCart(){

let html=""

let total=0

cart.forEach((item,index)=>{

let cost=item.price*item.qty

total+=cost

html+=`

<div class="cart-item">

${item.name} x ${item.qty}

<br>

₹${cost}

<br>

<span class="remove"

onclick="removeItem(${index})">

Remove

</span>

</div>

`

})

document.getElementById("items").innerHTML=html

document.getElementById("count").innerText=cart.length

document.getElementById("total").innerText=total

}

function removeItem(i){

cart.splice(i,1)

updateCart()

}

function payNow(){

let total=document.getElementById("total").innerText

if(total==0){

alert("Cart Empty")

return

}

var options={

key:"rzp_test_SNNhs7RaPBITes",

amount:total*100,

currency:"INR",

name:"OMGoracle",

description:"Luxury Candle Purchase",

handler:function(){

alert("Payment Successful!")

cart=[]

updateCart()

},

prefill:{

name:document.getElementById("name").value,

contact:document.getElementById("phone").value

},

theme:{
color:"#D4AF37"
}

}

var rzp=new Razorpay(options)

rzp.open()

}

</script>

</body>

</html>
