<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMGoracle Luxury Candles</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:sans-serif;
background:#0b0b0b;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:black;
position:sticky;
top:0;
z-index:1000;
}

.logo img{
height:45px;
filter:drop-shadow(0 0 5px gold);
}
  img{
max-width:100%;
height:auto;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

.cart{
color:gold;
font-weight:bold;
}

/* HERO */

.hero{
height:60vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
color:gold;
font-size:36px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:60px;
}

.product{
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
transition:.4s;
}

.product:hover{
transform:scale(1.05);
box-shadow:0 20px 40px rgba(212,175,55,0.3);
}

.product img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

.price{
color:gold;
}

button{
border:1px solid gold;
background:none;
color:gold;
padding:8px 20px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:gold;
color:black;
}

/* DEVELOPER */

.developer{
display:flex;
justify-content:center;
padding:80px;
}
.card{
width:220px;
padding:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:20px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);

box-shadow:
0 0 20px #ff00cc,
0 0 40px #ff00cc;

transition:transform 0.2s ease;
transform-style:preserve-3d;

position:relative;
overflow:hidden;
}

.profile{
width:90px;
height:90px;
border-radius:50%;
border:3px solid #ff00cc;
margin-bottom:10px;
}

/* PARTICLES */

.particles{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.particles::before{
content:"";
position:absolute;
width:4px;
height:4px;
background:gold;
border-radius:50%;

box-shadow:
20px 30px gold,
120px 80px gold,
200px 150px gold,
300px 60px gold,
400px 200px gold;

animation:particlesMove 8s linear infinite;
}

@keyframes particlesMove{

0%{transform:translateY(0)}
100%{transform:translateY(-400px)}

}

footer{
text-align:center;
padding:20px;
background:black;
color:#aaa;
}
  .logo img{
height:45px;
filter:drop-shadow(0 0 5px gold);
}
 .socials{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.socials a{
width:35px;
height:35px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border-radius:50%;
color:white;
transition:0.3s;
}

.socials a:hover{
background:#ff00cc;
color:black;
transform:scale(1.2);
}
.checkout{
margin:40px auto;
display:block;
font-size:16px;
padding:12px 30px;
}
</style>

</head>

<body>

<nav>

<div class="logo">
<img src="logo.jpg">
</div>

<ul>

<li><a href="#">Home</a></li>
<li><a href="#products">Products</a></li>
<li><a href="#developer">Developer</a></li>

<li class="cart">
🛒 (<span id="cart-count">0</span>)
</li>

</ul>

</nav>

<section class="hero">

<h1>Luxury Candle Collection</h1>
<p>Premium handcrafted fragrance candles</p>

</section>

<section id="products" class="products"></section>

<center>
<button class="checkout" onclick="checkout()">Checkout</button>
</center>

<section id="developer" class="developer">

<div class="card" id="card">

<div class="particles"></div>

<img src="mypic.jpg" class="profile">

<h2>Om Prakash</h2>
<h3>Web Developer</h3>

<p>Creator of OMGoracle Website</p>

<div class="socials">

<a href="#"><i class="fa-brands fa-github"></i></a>
<a href="#"><i class="fa-brands fa-instagram"></i></a>
<a href="#"><i class="fa-brands fa-linkedin"></i></a>

</div>

</div>

</section>
<footer>

Official Launch — 23 March | © OMGoracle

</footer>

<script>

const productsContainer=document.querySelector(".products")

let cart=[]
let total=0

for(let i=1;i<=20;i++){

let price=500+i*20

let product=`

<div class="product">

<img src="product${i}.jpg">

<h3>Candle ${i}</h3>

<p class="price">₹${price}</p>

<button onclick="addCart('Candle ${i}',${price})">
Add to Cart
</button>

</div>

`

productsContainer.innerHTML+=product

}

function addCart(name,price){

cart.push({name,price})
total+=price

document.getElementById("cart-count").innerText=cart.length

alert(name+" added to cart")

}

function checkout(){

if(cart.length==0){
alert("Cart Empty")
return
}

var options={

key:"rzp_test_SNNhs7RaPBITes",

amount:total*100,

currency:"INR",

name:"OMGoracle",

description:"Luxury Candle Purchase",

handler:function(){

generateInvoice()

}

}

var rzp=new Razorpay(options)

rzp.open()

}

function generateInvoice(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

doc.text("OMGoracle Invoice",20,20)

let y=40

cart.forEach(p=>{
doc.text(p.name+" - ₹"+p.price,20,y)
y+=10
})

doc.text("Total ₹"+total,20,y+10)

doc.save("OMGoracle_invoice.pdf")

}
  

const card = document.getElementById("card");

card.addEventListener("mousemove",(e)=>{

const rect = card.getBoundingClientRect();

const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

const centerX = rect.width/2;
const centerY = rect.height/2;

const rotateX = (y-centerY)/10;
const rotateY = (centerX-x)/10;

card.style.transform =
`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

});

card.addEventListener("mouseleave",()=>{
card.style.transform="rotateX(0) rotateY(0)";
});



</script>

</body>
</html>
