<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMGoracle Luxury Candles</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
z-index:1000;
}

.logo{
color:#D4AF37;
font-size:22px;
font-weight:bold;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
align-items:center;
}

nav ul li a{
text-decoration:none;
color:#ddd;
}

.cart-icon{
cursor:pointer;
position:relative;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:#D4AF37;
color:black;
font-size:12px;
padding:2px 6px;
border-radius:50%;
}

/* HERO */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
padding-left:8%;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.hero-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
to right,
rgba(0,0,0,0.9) 35%,
rgba(0,0,0,0.2)
);
z-index:-1;
}

.hero-content{
max-width:600px;
}

.hero-content h1{
font-size:60px;
margin-bottom:20px;
}

.hero-content span{
color:#D4AF37;
}

.btn{
padding:14px 35px;
background:#D4AF37;
border:none;
color:black;
font-weight:bold;
border-radius:40px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:white;
}

/* PRODUCTS */

.products{
padding:100px 8%;
text-align:center;
}

.section-title{
color:#D4AF37;
font-size:32px;
margin-bottom:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
transition:0.3s;
border:1px solid rgba(212,175,55,0.2);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px rgba(212,175,55,0.4);
border-color:#D4AF37;
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.price{
color:#D4AF37;
font-weight:bold;
margin:10px 0;
}

.qty{
width:60px;
padding:5px;
}

.cart{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:#111;
padding:30px;
transition:0.4s;
z-index:2000;
overflow-y:auto;
}

.cart.active{
right:0;
}

.cart-item{
border-bottom:1px solid #333;
padding:10px 0;
}

.remove{
color:red;
cursor:pointer;
font-size:13px;
}

.total{
color:#D4AF37;
margin:10px 0;
font-size:18px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

footer{
text-align:center;
padding:30px;
background:#111;
color:#D4AF37;
}

</style>

</head>

<body>

<nav>

<div class="logo">OMGoracle</div>

<ul>

<li><a href="#">Home</a></li>
<li><a href="#">Shop</a></li>
<li><a href="#">About</a></li>

<li class="cart-icon" onclick="toggleCart()">

🛒

<span class="cart-count" id="count">0</span>

</li>

</ul>

</nav>

<!-- HERO -->

<section class="hero">

<video autoplay muted loop>
<source src="about.mp4" type="video/mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-content">

<h1>Luxury <span>Candles</span></h1>

<p>Handcrafted candles designed for elegance.</p>

<button class="btn">Shop Now</button>

</div>

</section>

<!-- PRODUCTS -->

<section class="products">

<h2 class="section-title">Best Sellers</h2>

<div class="grid">

<div class="card">

<img src="blackcandle.jpg">

<h3>Black Edition</h3>

<p class="price">₹899</p>

Qty

<input type="number" id="q1" value="1" class="qty">

<br><br>

<button class="btn"
onclick="addToCart('Black Edition',899,'q1')">
Add to Cart
</button>

</div>

<div class="card">

<img src="pinkcandle.jpg">

<h3>Pink Luxury</h3>

<p class="price">₹999</p>

Qty

<input type="number" id="q2" value="1" class="qty">

<br><br>

<button class="btn"
onclick="addToCart('Pink Luxury',999,'q2')">
Add to Cart
</button>

</div>

</div>

</section>

<!-- CART -->

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="items"></div>

<p class="total">
Total ₹<span id="total">0</span>
</p>

<h3>Checkout</h3>

<input type="text" placeholder="Full Name" id="name">
<input type="tel" placeholder="Phone" id="phone">
<input type="text" placeholder="Address" id="address">

<br>

<button class="btn" onclick="payNow()">
Pay with Razorpay
</button>

</div>

<footer>

Official Launch – 23 March 🎂 | OMGoracle

</footer>

<script>

let cart=[]

function toggleCart(){
document.getElementById("cart").classList.toggle("active")
}

function addToCart(name,price,id){

let qty=document.getElementById(id).value

cart.push({name,price,qty})

updateCart()

}

function updateCart(){

let html=""
let total=0

cart.forEach((item,index)=>{

let cost=item.price*item.qty

total+=cost

html+=`

<div class="cart-item">

${item.name} x ${item.qty}

<br>

₹${cost}

<br>

<span class="remove" onclick="removeItem(${index})">
Remove
</span>

</div>

`

})

document.getElementById("items").innerHTML=html

document.getElementById("count").innerText=cart.length

document.getElementById("total").innerText=total

}

function removeItem(i){

cart.splice(i,1)

updateCart()

}

function payNow(){

let total=document.getElementById("total").innerText

if(total==0){
alert("Cart Empty")
return
}

var options={

key:"rzp_test_SNNhs7RaPBITes",

amount:total*100,

currency:"INR",

name:"OMGoracle",

description:"Luxury Candle Purchase",

handler:function(){
alert("Payment Successful!")
cart=[]
updateCart()
},

prefill:{
name:document.getElementById("name").value,
contact:document.getElementById("phone").value
},

theme:{
color:"#D4AF37"
}

}

var rzp=new Razorpay(options)

rzp.open()

}

</script>

</body>

</html>
