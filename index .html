<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMGoracle Luxury Store</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
--black:#0a0a0a;
--gold:#d4af37;
--dark:#161616;
--white:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(-45deg,#0a0a0a,#1a1a1a,#000,#111);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* LOGIN PAGE */
#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:40px;
border-radius:15px;
width:300px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.login-box h2{
font-family:'Playfair Display',serif;
color:var(--gold);
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
background:transparent;
border:1px solid var(--gold);
color:white;
}

.login-box button{
width:100%;
padding:10px;
background:var(--gold);
border:none;
cursor:pointer;
}

/* MAIN SITE */
#mainSite{
display:none;
}

header{
display:flex;
justify-content:space-between;
padding:20px 5%;
background:rgba(0,0,0,0.7);
}

.logo{
font-family:'Playfair Display',serif;
color:var(--gold);
font-size:1.5rem;
}

.cart{
cursor:pointer;
border:1px solid var(--gold);
padding:8px 15px;
}

.shop{
padding:40px 5%;
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:var(--dark);
border:1px solid #222;
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.info{
padding:15px;
text-align:center;
}

.price{
color:var(--gold);
margin:10px 0;
}

button{
background:transparent;
border:1px solid var(--gold);
color:white;
padding:6px 15px;
cursor:pointer;
margin:5px;
}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:var(--dark);
padding:25px;
max-width:350px;
text-align:center;
border:1px solid var(--gold);
}

.admin{
display:none;
text-align:center;
margin-top:40px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>OMGoracle Login</h2>
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- MAIN WEBSITE -->
<div id="mainSite">

<header>
<div class="logo">OMGoracle</div>
<div class="cart" onclick="openCart()">Cart (<span id="count">0</span>)</div>
</header>

<section class="shop">
<div class="grid" id="productGrid">

<div class="card">
<img src="1000033196.png">
<div class="info">
<h3>Midnight Onyx</h3>
<p class="price">₹1499</p>
<button onclick="addToCart('Midnight Onyx',1499)">Add</button>
</div>
</div>

<div class="card">
<img src="1000033195.png">
<div class="info">
<h3>Rose Quartz</h3>
<p class="price">₹1499</p>
<button onclick="addToCart('Rose Quartz',1499)">Add</button>
</div>
</div>

</div>

<br>
<center>
<button onclick="openAdmin()">Open Admin Panel</button>
</center>

<div class="admin">
<h3>Add Product</h3>
<input type="text" id="pname" placeholder="Product Name">
<input type="number" id="pprice" placeholder="Price">
<input type="text" id="pimg" placeholder="Image File Name">
<br>
<button onclick="addProduct()">Add Product</button>
</div>

</section>

</div>

<!-- CART POPUP -->
<div class="popup" id="cartPopup">
<div class="popup-content">
<h3>Your Cart</h3>
<div id="cartDetails"></div>
<br>
<button onclick="closeCart()">Close</button>
</div>
</div>

<script>
let cart=[];

function login(){
let pass=document.getElementById("password").value;
if(pass==="omg123"){
document.getElementById("loginPage").style.display="none";
document.getElementById("mainSite").style.display="block";
}else{
alert("Wrong Password");
}
}

function addToCart(name,price){
cart.push({name,price});
document.getElementById("count").innerText=cart.length;
}

function openCart(){
let details="";
let total=0;
cart.forEach(item=>{
details+=`<p>${item.name} - ₹${item.price}</p>`;
total+=item.price;
});
details+=`<hr><h4>Total: ₹${total}</h4>`;
document.getElementById("cartDetails").innerHTML=details;
document.getElementById("cartPopup").style.display="flex";
}

function closeCart(){
document.getElementById("cartPopup").style.display="none";
}

function openAdmin(){
let adminPass=prompt("Enter Admin Password");
if(adminPass==="admin123"){
document.querySelector(".admin").style.display="block";
}else{
alert("Access Denied");
}
}

function addProduct(){
let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let img=document.getElementById("pimg").value;

let product=`
<div class="card">
<img src="${img}">
<div class="info">
<h3>${name}</h3>
<p class="price">₹${price}</p>
<button onclick="addToCart('${name}',${price})">Add</button>
</div>
</div>
`;

document.getElementById("productGrid").innerHTML+=product;
}
</script>

</body>
</html>
