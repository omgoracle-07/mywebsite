
<!DOCTYPE html>
<html>
<head>
<title>Login - OMGoracle</title>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
width:320px;
padding:35px;
border-radius:20px;
background:#1a1a1a;
border:1px solid gold;
text-align:center;
}

h2{
color:gold;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:10px;
background:gold;
border:none;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

a{
color:gold;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>New user? <a href="register.html">Create Account</a></p>

</div>

<script>

function login(){

let username=document.getElementById("username").value
let password=document.getElementById("password").value

let users=JSON.parse(localStorage.getItem("users")) || []

let user=users.find(u=>u.username===username && u.password===password)

if(user){

localStorage.setItem("loggedIn",true)

window.location.href="index.html"

}else{

alert("Invalid Login")

}

}

</script>

</body>
</html>
